<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Adventure Loading...</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    body {
        margin: 0;
        background: #0d0d0d;
        color: #00ff9c;
        font-family: "Courier New", monospace;
        overflow: hidden;
    }
    #terminal {
        padding: 40px;
        font-size: 18px;
        white-space: pre-wrap;
    }
    #inviteCard {
        display: none;
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: #ffffff;
        color: #222;
        border-radius: 16px;
        padding: 30px;
        width: 330px;
        text-align: center;
        font-family: Arial, sans-serif;
        box-shadow: 0 0 30px rgba(0,255,180,0.3);
        animation: fadeIn 1.5s ease forwards;
    }
    #inviteCard img {
        width: 140px;
        height: 140px;
        border-radius: 50%;
        object-fit: cover;
        margin-bottom: 15px;
        border: 3px solid #00c182;
    }
    #inviteCard h2 {
        margin-top: 0;
        font-size: 24px;
        color: #00a86b;
    }
    #inviteCard button {
        padding: 10px 20px;
        background: #00a86b;
        border: none;
        color: #fff;
        border-radius: 8px;
        cursor: pointer;
        font-size: 16px;
        margin-top: 10px;
        transition: 0.2s;
    }
    #inviteCard button:hover {
        background: #008c59;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translate(-50%, -48%); }
        to { opacity: 1; transform: translate(-50%, -50%); }
    }
</style>
</head>
<body>

<div id="terminal"></div>

<div id="inviteCard">
    <!-- Replace with your manga/chibi image link -->
    <img src="YOUR-MANGA-IMAGE.jpg" alt="Adil Otha">
    <h2>Adventure Awaits!</h2>
    <p><strong>Adil Otha is leveling up!</strong></p>
    <p>
        📍 <strong>Location:</strong> Playtime Bowl & Entertainment<br>
        📅 <strong>Date:</strong> April 20, 2026<br>
        🕒 <strong>Time:</strong> 12 PM
    </p>
    <p style="font-size: 14px; color: #444;">
        Gear up, traveler. A new quest begins — come celebrate the next great adventure!
    </p>
    <button onclick="window.location.href='RSVP-LINK-HERE'">Deploy RSVP</button>
</div>

<script>
const terminalText = [
    "> booting adventure_sequence.exe",
    "> loading terrain modules...",
    "> activating hiking_engine()",
    "> compiling foodie_protocols...",
    "> rendering mountainscape...",
    "> scanning for party coordinates...",
    "> SUCCESS: Adventure Ready.",
    "",
    "> press any key or click to continue..."
];

let index = 0;
const terminal = document.getElementById("terminal");

function typeLine() {
    if (index < terminalText.length) {
        terminal.innerHTML += terminalText[index] + "\n";
        index++;
        setTimeout(typeLine, 550);
    } else {
        window.addEventListener("keydown", showCardOnce);
        window.addEventListener("click", showCardOnce);
    }
}
function showCardOnce() {
    showCard();
    window.removeEventListener("keydown", showCardOnce);
    window.removeEventListener("click", showCardOnce);
}
function showCard() {
    document.getElementById("terminal").style.display = "none";
    document.getElementById("inviteCard").style.display = "block";
}
typeLine();
</script>

</body>
</html>
